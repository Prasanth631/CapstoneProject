# WARNING: Do NOT commit real credentials to Git.
# For production, use Sealed Secrets, HashiCorp Vault, or AWS Secrets Manager.
# These are placeholder values — replace with actual base64-encoded secrets during deployment.
# Generate base64 values: echo -n 'your-secret' | base64
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-credentials
  namespace: capstone-app
type: Opaque
data:
  username: REPLACE_WITH_BASE64_USERNAME
  token: REPLACE_WITH_BASE64_TOKEN
