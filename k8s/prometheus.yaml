# =============================================
# Prometheus: ConfigMap, Service
# =============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: capstone-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'spring-boot-app'
        metrics_path: '/actuator/prometheus'
        scrape_interval: 15s
        static_configs:
          - targets: ['capstone-service.capstone-app.svc.cluster.local:8082']
            labels:
              application: 'capstone'
              environment: 'production'

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - capstone-app
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: capstone
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__address__]
            target_label: __address__
            replacement: $1:8082

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: capstone-app
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30090
