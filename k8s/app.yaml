# =============================================
# Application: ConfigMap, Secrets, Deployment,
# Service, HPA, NetworkPolicy, ResourceQuota
# =============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: capstone-config
  namespace: capstone-app
data:
  APPLICATION_NAME: "CapstoneProject"
  SERVER_PORT: "8082"
  SPRING_PROFILES_ACTIVE: "prod"

---
# WARNING: Replace placeholders with real base64 values during deployment
# Generate: echo -n 'your-secret' | base64
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-credentials
  namespace: capstone-app
type: Opaque
data:
  username: REPLACE_WITH_BASE64_USERNAME
  token: REPLACE_WITH_BASE64_TOKEN

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-deployment
  namespace: capstone-app
  labels:
    app: capstone
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: capstone
  template:
    metadata:
      labels:
        app: capstone
        version: v1
    spec:
      containers:
      - name: capstone-container
        image: prasanth631/capstone_pro:latest
        imagePullPolicy: Always
        env:
          - name: JENKINS_URL
            value: "http://host.docker.internal:8080"
          - name: JENKINS_USER
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: username
          - name: JENKINS_TOKEN
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: token
          - name: DB_HOST
            value: "postgres.capstone-app.svc.cluster.local"
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: database
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: username
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: password
        ports:
        - name: http
          containerPort: 8082
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: capstone-service
  namespace: capstone-app
  labels:
    app: capstone
spec:
  type: NodePort
  selector:
    app: capstone
  ports:
  - name: http
    protocol: TCP
    port: 8082
    targetPort: 8082
    nodePort: 30080
  sessionAffinity: ClientIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: capstone-hpa
  namespace: capstone-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: capstone-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: capstone-network-policy
  namespace: capstone-app
spec:
  podSelector:
    matchLabels:
      app: capstone
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8082
  egress:
  - to:
    - podSelector: {}

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: capstone-quota
  namespace: capstone-app
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "10"
